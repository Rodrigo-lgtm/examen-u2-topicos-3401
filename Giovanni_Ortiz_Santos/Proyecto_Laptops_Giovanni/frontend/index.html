<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Laptops</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="inicio">
            <i class="bi bi-laptop"></i>
            <h1>Inventario Laptops</h1>
        </div>
        <div class="inicio2">
            <form id="formulario">
                <input id="marca" type="text" placeholder="Marca (Ej: ASUS, Machenike)" required>
                <input id="modelo" type="text" placeholder="Modelo (Ej: TUF A15)" required>
                <input id="precio" type="number" placeholder="Precio ($)" required>
                <button id="btn-agregar"><i class="bi bi-plus-circle"></i> Agregar</button>
            </form>
        </div>
    </header>
    <main>
        <ul>
            <li class="encabezado">
                <div class="col-nombre">Marca</div>
                <div class="col-nombre">Modelo</div>
                <div class="col-precio">Precio</div>
            </li>
        </ul>
        <ul id="tabla">
            </ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/obtenerLaptop.js"></script>
    <script src="js/crearLaptop.js"></script>
</body>
</html>
